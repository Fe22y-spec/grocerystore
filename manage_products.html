<body class="tooltips">
<div class="container">

    <div class="header content rows-content-header">
        <button class="button-menu-mobile show-sidebar">
            <i class="fa fa-bars"></i>
        </button>
        <div class="header">
            <div class="navbar navbar-default">
                <div class="container-fluid">
                    <ul class="nav navbar-nav">
                        <li>
                            <a href="index.html">
                                <i class="fa fa-home"></i>index
                            </a>
                        </li>
                        <li>
                            <a href="manage_products.html">
                                <i class="fa fa-shopping-cart"></i> Products
                            </a>
                        </li>
                        <li>
                            <a href="orders.html">
                                <i class="fa fa-truck"></i> Orders
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <div class="right content-page">
        <div class="body content rows scroll-y">
            <div class="box-info full" id="taskFormContainer">
                <h2>Manage Products</h2>
                <div class="panel-body pt-0">
                    <div class="row mb-4">
                        <div class="col-sm-12">
                            <button type="button" class="btn btn-primary pull-right" onclick="openModal()">
                                Add New Product
                            </button>
                        </div>
                    </div>
                    <div class="table-responsive">
                    <table class="table table-bordered" id="productTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Unit</th>
                                <th>Price Per Unit</th>
                                <th>Stock Quantity</th>
                                <th style="width: 150px">Action</th>
                            </tr>
                        </thead>
                        <tbody id="productList">
                            <!-- Products will appear here -->
                        </tbody>
                    </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal" id="productModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title">Add New Product</h4>
                <button type="button" onclick="closeModal()" style="float: right;">&times;</button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <input type="hidden" name="id" id="id" value="0">
                    <div class="row">
                        <div class="col-sm-12">
                            <div class="form-group">
                                <label>Name</label>
                                <input class="form-control" placeholder="Name" name="name" id="name" type="text" value="" required>
                            </div>
                        </div>
                        <div class="col-sm-12">
                            <div class="form-group">
                                <label> Unit</label>
                                <select name="uoms" id="uoms" class="form-control" required>
                                    <option value="">Select Unit</option>
                                    <option value="kg">Kilogram (kg)</option>
                                    <option value="g">Gram (g)</option>
                                    <option value="liter">Liter (L)</option>
                                    <option value="ml">Milliliter (ml)</option>
                                    <option value="piece">Piece (pc)</option>
                                    <option value="dozen">Dozen</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-sm-12">
                            <div class="form-group">
                                <label>Price Per Unit</label>
                                <input class="form-control" placeholder="Price Per Unit" name="price" id="price" type="number" step="0.01" value="" required>
                            </div>
                        </div>
                        <div class="col-sm-12">
                             <div class="form-group">
                                <label>Stock Quantity</label>
                                <input class="form-control" placeholder="Stock Quantity" name="stock" id="stock" type="number" value="0" required>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Close</button>
                <button type="button" class="btn btn-primary" id="saveProduct" onclick="saveProduct()">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="manage_products.js"></script>
</body>
</html>
