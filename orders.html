<!DOCTYPE html>
<html>
<head>
    <title>GSMS - Orders</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS Links -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,300,600,700" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-image: url('download2.png');
            background-size: cover;
            background-attachment: fixed;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .box-info {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        .cart-item {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }
        
        .total-price {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
            margin-top: 20px;
            text-align: right;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        
        th {
            background-color: #f2f2f2;
        }
        
        .navbar-nav {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
        }
        
        .navbar-nav li {
            margin-right: 20px;
        }
        
        .navbar-nav a {
            color: #333;
            text-decoration: none;
            padding: 10px;
        }
        
        .navbar-nav a:hover {
            background-color: #f0f0f0;
            border-radius: 5px;
        }
        
        .remove-item {
            color: red;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- Navigation -->
    <div class="header">
        <div class="navbar navbar-default">
            <div class="container-fluid">
                <ul class="nav navbar-nav">
                  <li>
                        <a href="index.html">
                            <i class="fa fa-home"></i>index
                        </a>
                    </li>
                    <li>
                        <a href="manage_products.html">
                            <i class="fa fa-shopping-cart"></i> Products
                        </a>
                    </li>
                    <li>
                        <a href="orders.html">
                            <i class="fa fa-truck"></i> Orders
                        </a>
                  </li>
                </ul>
            </div>
        </div>
    </div>
    
    <h1>Create New Order</h1>
    
    <div class="row">
        <!-- Left Column: Product Selection -->
        <div class="col-md-5">
            <div class="box-info">
                <h3>Select Product</h3>
                <div class="form-group">
                    <label>Product</label>
                    <select id="productSelect" class="form-control">
                        <option value="">-- Select Product --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="quantity" class="form-control" value="1" min="1">
                </div>
                <button class="btn btn-primary" onclick="addToCart()">
                    <i class="fa fa-plus"></i> Add to Cart
                </button>
            </div>
        </div>
        
        <!-- Right Column: Shopping Cart -->
        <div class="col-md-7">
            <div class="box-info">
                <h3>Shopping Cart</h3>
                <div id="cartItems">
                    <p style="text-align: center; color: #999;">Cart is empty</p>
                </div>
                <div class="total-price" id="totalPrice">
                    Total: $0.00
                </div>
                <button class="btn btn-success" onclick="completeOrder()" style="margin-top: 10px;">
                    <i class="fa fa-check"></i> Complete Order
                </button>
            </div>
        </div>
    </div>
    
    <!-- Order History Section -->
    <div class="box-info">
        <h3>Order History</h3>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Date</th>
                    <th>Items</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="orderHistoryList">
                <tr>
                    <td colspan="4" style="text-align: center;">No orders yet</td>
                </tr>
            </tbody>
        </table>
    </div>
    
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
    // Shopping cart array
    let cart = [];
    
    // Load products into dropdown
    function loadProductsDropdown() {
        const stored = localStorage.getItem('products');
        if (stored) {
            const products = JSON.parse(stored);
            const select = document.getElementById('productSelect');
            select.innerHTML = '<option value="">-- Select Product --</option>';
            
            for (let i = 0; i < products.length; i++) {
                const product = products[i];
                const option = document.createElement('option');
                option.value = product.id;
                option.textContent = `${product.name} - $${product.price} (Stock: ${product.stock || 0})`;
                select.appendChild(option);
            }
        }
    }
    
    // Add to cart
    function addToCart() {
        const productId = parseInt(document.getElementById('productSelect').value);
        const quantity = parseInt(document.getElementById('quantity').value);
        
        if (!productId) {
            alert('Please select a product');
            return;
        }
        
        if (quantity < 1) {
            alert('Quantity must be at least 1');
            return;
        }
        
        // Get product details from localStorage
        const stored = localStorage.getItem('products');
        const products = JSON.parse(stored);
        const product = products.find(p => p.id === productId);
        
        if (!product) {
            alert('Product not found');
            return;
        }
        
        // Check if enough stock
        if (product.stock < quantity) {
            alert(`Not enough stock! Only ${product.stock} available.`);
            return;
        }
        
        // Check if product already in cart
        const existingItem = cart.find(item => item.id === productId);
        
        if (existingItem) {
            // Update quantity
            existingItem.quantity += quantity;
        } else {
            // Add new item
            cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                quantity: quantity
            });
        }
        
        // Refresh cart display
        renderCart();
        
        // Reset quantity input
        document.getElementById('quantity').value = 1;
    }
    
    // Remove from cart
    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        renderCart();
    }
    
    // Render cart
    function renderCart() {
        const cartDiv = document.getElementById('cartItems');
        
        if (cart.length === 0) {
            cartDiv.innerHTML = '<p style="text-align: center; color: #999;">Cart is empty</p>';
            document.getElementById('totalPrice').innerHTML = 'Total: $0.00';
            return;
        }
        
        let html = '';
        let total = 0;
        
        for (let i = 0; i < cart.length; i++) {
            const item = cart[i];
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            
            html += `
                <div class="cart-item">
                    <div>
                        <strong>${item.name}</strong><br>
                        $${item.price} x ${item.quantity} = $${itemTotal.toFixed(2)}
                    </div>
                    <div>
                        <span class="remove-item" onclick="removeFromCart(${item.id})">
                            <i class="fa fa-trash"></i> Remove
                        </span>
                    </div>
                </div>
            `;
        }
        
        cartDiv.innerHTML = html;
        document.getElementById('totalPrice').innerHTML = `Total: $${total.toFixed(2)}`;
    }
    
    // Complete order
    function completeOrder() {
        if (cart.length === 0) {
            alert('Cart is empty! Add some products first.');
            return;
        }
        
        // Confirm order
        if (!confirm('Complete this order?')) {
            return;
        }
        
        // Get current products
        const stored = localStorage.getItem('products');
        let products = stored ? JSON.parse(stored) : [];
        
        // Update stock for each item in cart
        for (let i = 0; i < cart.length; i++) {
            const cartItem = cart[i];
            const productIndex = products.findIndex(p => p.id === cartItem.id);
            
            if (productIndex !== -1) {
                products[productIndex].stock -= cartItem.quantity;
            }
        }
        
        // Save updated products
        localStorage.setItem('products', JSON.stringify(products));
        
        // Create order object
        const order = {
            id: Date.now(),
            date: new Date().toLocaleString(),
            items: [...cart],
            total: calculateTotal()
        };
        
        // Get existing orders
        const storedOrders = localStorage.getItem('orders');
        let orders = storedOrders ? JSON.parse(storedOrders) : [];
        
        // Add new order
        orders.push(order);
        
        // Save orders
        localStorage.setItem('orders', JSON.stringify(orders));
        
        // Clear cart
        cart = [];
        renderCart();
        
        // Refresh order history
        loadOrderHistory();
        
        // Refresh product dropdown
        loadProductsDropdown();
        
        alert('Order completed successfully!');
    }
    
    // Calculate total
    function calculateTotal() {
        let total = 0;
        for (let i = 0; i < cart.length; i++) {
            total += cart[i].price * cart[i].quantity;
        }
        return total;
    }
    
    // Load order history
    function loadOrderHistory() {
        const stored = localStorage.getItem('orders');
        const orders = stored ? JSON.parse(stored) : [];
        const tbody = document.getElementById('orderHistoryList');
        
        if (orders.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No orders yet</td></tr>';
            return;
        }
        
        tbody.innerHTML = '';
        
        // Show most recent orders first
        for (let i = orders.length - 1; i >= 0; i--) {
            const order = orders[i];
            const row = tbody.insertRow();
            
            // Count total items in order
            let itemCount = 0;
            for (let j = 0; j < order.items.length; j++) {
                itemCount += order.items[j].quantity;
            }
            
            row.insertCell(0).textContent = '#' + order.id;
            row.insertCell(1).textContent = order.date;
            row.insertCell(2).textContent = itemCount + ' items';
            row.insertCell(3).textContent = '$' + order.total.toFixed(2);
        }
    }
    
    // Initialize page
    function init() {
        loadProductsDropdown();
        loadOrderHistory();
    }
    
    // Run when page loads
    init();
</script>

</body>
</html>
